<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Sense Bot</title>
  <link href="chatbot.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" />
</head>

<body>
  <div class="chatbot-fs">
    <!-- Voice Mode Overlay -->
    <!-- Added -->
<div id="voice-overlay" class="voice-overlay hidden">
  <button id="voiceBtn" class="exit-button">X</button>  <!-- IDK FOR CHANGE " exit-voice-mode" --> 
  <!-- Added GROK -->
  <div class="rainbow-ball"></div>
  <!-- Added GROK -->
  <div id="voice-status-box" style="display:none"></div>
</div>

    <!-- Chatbot Header --> 
    <div class="chat-header">
      <div class="header-info">
        <svg class="chatbot-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" width="65" height="65">
          <path fill-rule="evenodd" d="M1 8.74c0 .983.713 1.825 1.69 1.943.764.092 1.534.164 2.31.216v2.351a.75.75 0 0 0 1.28.53l2.51-2.51c.182-.181.427-.286.684-.294a44.298 44.298 0 0 0 3.837-.293C14.287 10.565 15 9.723 15 8.74V4.26c0-.983-.713-1.825-1.69-1.943a44.447 44.447 0 0 0-10.62 0C1.712 2.435 1 3.277 1 4.26v4.482ZM5.5 6.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm2.5 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm3.5 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
        </svg>
        <h2 class="logo-text">Sense Bot</h2>
        <button id="close-chatbot" class="material-symbols-outlined">keyboard_arrow_down</button>
      </div>
    </div>
    
    <!-- Chat Body -->
    <div class="chat-body">
      <div class="message bot-message">
        <svg class="bot-avatar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" width="65" height="65">
          <path fill-rule="evenodd" d="M1 8.74c0 .983.713 1.825 1.69 1.943.764.092 1.534.164 2.31.216v2.351a.75.75 0 0 0 1.28.53l2.51-2.51c.182-.181.427-.286.684-.294a44.298 44.298 0 0 0 3.837-.293C14.287 10.565 15 9.723 15 8.74V4.26c0-.983-.713-1.825-1.69-1.943a44.447 44.447 0 0 0-10.62 0C1.712 2.435 1 3.277 1 4.26v4.482ZM5.5 6.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm2.5 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm3.5 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
        </svg>
        <div class="message-text">Hi! I'm SenseBot, here to help you relax and manage stress. How are you feeling today?</div>
      </div> 
    </div>

    <!-- Chat footer -->
    <div class="chat-footer">
      <form action="#" class="chat-form">
        <textarea placeholder="message..." class="message-input" required></textarea>
        <div class="chat-controls">
          <!--added--> 
          <button type="button" id="voice-button">
        <span class="material-symbols-outlined">record_voice_over</span>
    </button>
          <button type="submit" id="send-message">
            <span class="material-symbols-outlined">arrow_upward</span>
          </button>
          </div>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
